<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Learnify Academy — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/competition.css">
    <link rel="stylesheet" href="../styles/academy.css">
</head>

<body class="academy-login-page">

    <div class="login-card">
        <img src="../al_horya_school.jpg" alt="Learnify Academy" class="logo-img">
        <h1 data-i18n-a="login.heading">مرحباً بكم في Learnify Academy</h1>
        <p class="login-sub" data-i18n-a="login.subheading">محتوى المناهج والكامبات متاح للأهالي والمعلمين بكلمة مرور</p>

        <div class="lang-switcher" style="justify-content:center;margin-bottom:1.5rem;">
            <button type="button" data-lang="ar" class="active">ع</button>
            <button type="button" data-lang="en">EN</button>
        </div>

        <form id="academy-login-form" class="login-form">
            <label for="academy-password" data-i18n-a="login.passwordLabel">كلمة المرور</label>
            <input type="password" id="academy-password" autocomplete="current-password"
                data-i18n-a="login.passwordPlaceholder" placeholder="أدخل كلمة المرور" required>
            <p id="login-error" class="login-error" hidden data-i18n-a="login.error">كلمة المرور غير صحيحة</p>
            <button type="submit" class="btn btn-primary" style="width:100%;" data-i18n-a="login.submit">دخول</button>
        </form>

        <p style="margin-top:1.5rem;font-size:0.875rem;color:var(--color-gray-500);">
            <span data-i18n-a="login.hint">للحصول على كلمة المرور تواصل معنا</span><br>
            <a id="login-contact" href="https://wa.me/201038583382" style="color:var(--color-secondary);font-weight:600;">01038583382</a>
        </p>
    </div>

    <script src="../scripts/academy-translations.js"></script>
    <script src="../scripts/academy-auth.js"></script>
    <script src="../scripts/academy-portal.js"></script>
</body>

</html>
